# version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-communityboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}  # pragma: allowlist secret
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d communityboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-communityboard}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}  # pragma: allowlist secret
      JWT_SECRET: ${JWT_SECRET:-communityboard-secret-key-amalitech-2024}
      SPRING_SQL_INIT_MODE: never
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}  # pragma: allowlist secret
      EMAIL_VERIFICATION_ENABLED: ${EMAIL_VERIFICATION_ENABLED:-true}
      EMAIL_VERIFICATION_FROM: ${EMAIL_VERIFICATION_FROM:-no-reply@communityboard.local}
      EMAIL_VERIFICATION_URL: ${EMAIL_VERIFICATION_URL:-http://localhost:3000/verify-email}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-true}
      EMAIL_NOTIFICATIONS_FROM: ${EMAIL_NOTIFICATIONS_FROM:-no-reply@communityboard.local}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

  etl:
      build: ./data-engineering
      volumes:
      - ./data-engineering/database:/app/database
      environment:
        DB_HOST: postgres
        DB_PORT: 5432
        DB_NAME: ${POSTGRES_DB:-communityboard}
        DB_USER: ${POSTGRES_USER:-postgres}
        DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}  # pragma: allowlist secret
      depends_on:
        postgres:
          condition: service_healthy
      restart: always   # keep the listener alive, restart if it crashes

volumes:
  pgdata:
