# SonarCloud project configuration for the frontend (React / TypeScript)
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
#
# projectKey and organization must match what SonarCloud assigned when
# you imported the repository. Update these if they differ.

sonar.projectKey=ayamigah16_community-board
sonar.projectName=community-board
sonar.organization=ayamigah16

# Source and test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage report (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated/vendor files from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.*,src/setupTests.*,src/index.*,src/custom.d.ts

# Encoding
sonar.sourceEncoding=UTF-8
