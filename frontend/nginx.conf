server {
    listen 80;

    # Serve built assets directly; never fall back to index.html for missing files.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    # Proxy /api requests to the backend service within Docker Compose.
    # In production the ALB handles this routing instead of nginx.
}
