##############################################################################
# deploy.yml — Deployment Pipeline
#
# Triggers : workflow_run — runs automatically after Docker Build & Push
#              succeeds on main (→ production) or develop (→ staging)
#            workflow_dispatch — manual deploy with image tag + environment
#
# Flow:
#   prepare  → resolves image tag, target environment, and ECR URL
#   deploy   → downloads current ECS task def, updates container image,
#              registers new task def revision, updates ECS service,
#              and waits for healthy stability
#
# Services deployed:
#   community-board-frontend  (Nginx :80)
#   community-board-backend   (Spring Boot :8080)
#
# Branch → environment mapping:
#   main    → production  (GitHub Environment with required reviewers)
#   develop → staging     (GitHub Environment, auto-deploy)
#
# Required secrets (set as repository or environment secrets):
#   AWS_ROLE_ARN    — IAM role with OIDC trust for GitHub Actions
#   AWS_ACCOUNT_ID  — 12-digit AWS account ID
#
# Required GitHub Environments (Settings → Environments):
#   staging     — no required reviewers; deploy on every develop push
#   production  — add required reviewers to gate production releases
##############################################################################
name: Deploy

on:
  workflow_run:
    workflows: [ "Docker Build & Push" ]
    branches: [ main, develop ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "7-char image tag (git SHA prefix) to deploy"
        required: true
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [ staging, production ]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.event.inputs.environment }}
  cancel-in-progress: false # never interrupt a running ECS deploy

env:
  AWS_REGION: eu-west-1
  ECR_REPO: community-board
  ECS_CLUSTER: community-board-cluster

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve deployment context before requesting environment approval
  # ─────────────────────────────────────────────────────────────────────────
  prepare:
    name: Resolve deployment context
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    outputs:
      image_tag: ${{ steps.ctx.outputs.image_tag }}
      environment: ${{ steps.ctx.outputs.environment }}

    steps:
    - name: Compute context
      id: ctx
      run: |
        if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
          SHA="${{ github.event.workflow_run.head_sha }}"
          IMAGE_TAG="${SHA::7}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          ENV=$([[ "$BRANCH" == "main" ]] && echo "production" || echo "staging")
        else
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          ENV="${{ github.event.inputs.environment }}"
        fi
        echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
        echo "environment=$ENV"     >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────
  # ECS rolling deploy — frontend then backend (max-parallel: 1)
  # Each deploys by:
  #   1. Downloading the current task definition JSON
  #   2. Updating the container image reference to the new SHA tag
  #   3. Registering the new task definition revision
  #   4. Updating the ECS service and waiting for stable health checks
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.service }} → ${{ needs.prepare.outputs.environment }}
    needs: prepare
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.environment }}

    strategy:
      max-parallel: 1 # deploy frontend before backend to avoid mixed-version traffic
      matrix:
        include:
        - service: frontend
          container: frontend
        - service: backend
          container: backend

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # Build the full ECR image URI from the authenticated session — avoids
    # depending on AWS_ACCOUNT_ID secret which is not available in the
    # prepare job (no environment context there).
    - name: Build ECR image URI
      id: ecr
      run: |
        ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
        IMAGE="${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ matrix.service }}-${{ needs.prepare.outputs.image_tag }}"
        echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

    # Download current task definition so we can update the image URI
    - name: Download current task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition community-board-${{ matrix.service }} \
          --query taskDefinition \
          --region ${{ env.AWS_REGION }} \
          > task-def-${{ matrix.service }}.json

    # Replace container image URI with the new SHA-tagged image
    - name: Render updated task definition
      id: render
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-def-${{ matrix.service }}.json
        container-name: ${{ matrix.container }}
        image: ${{ steps.ecr.outputs.image }}

    # Register new revision and update the ECS service
    - name: Deploy to ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render.outputs.task-definition }}
        service: community-board-${{ matrix.service }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
        wait-for-minutes: 15

    - name: Deployment summary
      run: |
        echo "### ${{ matrix.service }} deployed to ${{ needs.prepare.outputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
        echo "**Image tag:** \`${{ matrix.service }}-${{ needs.prepare.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "**Environment:** ${{ needs.prepare.outputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
