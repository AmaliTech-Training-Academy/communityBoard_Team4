##############################################################################
# quality.yml — Code Quality Gate (SonarCloud)
#
# Triggers: push to main/develop and every pull request targeting those
#           branches. SonarCloud decorates PRs with inline issue annotations
#           and blocks merge if the Quality Gate fails.
#
# Jobs:
#   sonar-backend  — mvn clean verify sonar:sonar (uses JaCoCo coverage)
#   sonar-frontend — SonarSource/sonarcloud-github-action (uses Vitest LCOV)
#
# Required secrets (Settings → Secrets → Actions):
#   SONAR_TOKEN — generated at sonarcloud.io → My Account → Security
#
# Required GitHub Variables (Settings → Variables → Actions):
#   SONAR_ORGANIZATION — your SonarCloud organization key
#                        (defaults to 'amalitech-training-academy')
#
# First-time setup:
#   1. Sign in to sonarcloud.io with your GitHub account
#   2. Import the repository under your organization
#   3. Note the Project Keys shown during import (used in -Dsonar.projectKey)
#   4. Generate a token and add it as SONAR_TOKEN repository secret
#   5. Update the projectKey values below to match what SonarCloud assigned
##############################################################################
name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # SonarCloud PR decoration

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend — Spring Boot analyzed with SonarCloud via Maven plugin.
  # JaCoCo XML report is passed as coverage source.
  # ─────────────────────────────────────────────────────────────────────────
  sonar-backend:
    name: SonarCloud — Backend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # full history required for blame/new-code detection

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: temurin
        cache: maven

    - name: Build, test & analyze
      working-directory: ./backend
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.projectKey=AmaliTech-Training-Academy_communityBoard_Team4_backend \
          -Dsonar.projectName="CommunityBoard Backend" \
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || 'amalitech-training-academy' }} \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
          -Dsonar.qualitygate.wait=true

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — React/TypeScript analyzed via SonarSource's GitHub Action.
  # Coverage is collected from vitest --coverage (LCOV format).
  # sonar-project.properties in frontend/ provides project config.
  # ─────────────────────────────────────────────────────────────────────────
  sonar-frontend:
    name: SonarCloud — Frontend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run tests with LCOV coverage
      working-directory: ./frontend
      run: npm run test:ci
      continue-on-error: true # don't block analysis if tests fail

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: frontend
