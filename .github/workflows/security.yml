##############################################################################
# security.yml — Security Scanning Pipeline
#
# Provides three layers of security scanning:
#
#   1. SAST (CodeQL)
#      GitHub's CodeQL analyzes Java (backend) and JavaScript/TypeScript
#      (frontend) source code for security vulnerabilities. Runs on every
#      PR and push to main/develop, plus a weekly scheduled scan to catch
#      newly published vulnerability patterns against unchanged code.
#      Results appear in the Security → Code scanning tab.
#
#   2. SCA — Dependency vulnerability scanning
#      - Backend: OWASP Dependency-Check (Maven) against the NVD database
#      - Frontend: npm audit
#      Both report via SARIF to the Security tab and fail on CVSS ≥ 7.
#
#   3. Secret detection
#      TruffleHog scans commits introduced by PRs for leaked credentials
#      (API keys, tokens, passwords) in code, configs, and commit history.
#
# No additional secrets required — uses GITHUB_TOKEN throughout.
# CodeQL uploads results to the repo's Security tab automatically.
##############################################################################
name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
  - cron: "0 3 * * 1" # weekly Monday 03:00 UTC — catch new CVE patterns

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write # upload SARIF results to the Security tab
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # CodeQL SAST — Java (backend)
  # ─────────────────────────────────────────────────────────────────────────
  codeql-backend:
    name: CodeQL — Java
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: temurin
        cache: maven

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: java
        queries: security-extended

    - name: Build backend (CodeQL autobuild)
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: sast-java

  # ─────────────────────────────────────────────────────────────────────────
  # CodeQL SAST — JavaScript / TypeScript (frontend)
  # ─────────────────────────────────────────────────────────────────────────
  codeql-frontend:
    name: CodeQL — JavaScript / TypeScript
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: javascript-typescript
        queries: security-extended

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: sast-javascript

  # ─────────────────────────────────────────────────────────────────────────
  # SCA — Backend: OWASP Dependency-Check
  # Scans Maven dependencies against the NVD database.
  # CVSS score ≥ 7 fails the build; results uploaded as SARIF.
  # ─────────────────────────────────────────────────────────────────────────
  sca-backend:
    name: SCA — Backend Dependencies (OWASP)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: temurin
        cache: maven

    - name: OWASP Dependency-Check
      working-directory: ./backend
      # -Dformat=ALL generates HTML + JSON + XML + SARIF in one pass.
      # The SARIF file is always written regardless of whether CVEs are found.
      # NVD API key (optional): add NVD_API_KEY repo secret to speed up DB download.
      #   https://nvd.nist.gov/developers/request-an-api-key
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: |
        mvn dependency-check:check \
          -DfailBuildOnCVSS=7 \
          -Dformat=ALL \
          -DoutputDirectory=target/dependency-check \
          || true   # don't fail here; let the SARIF upload surface issues

    - name: Upload OWASP results to Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('backend/target/dependency-check/dependency-check-report.sarif') != ''
      with:
        sarif_file: backend/target/dependency-check/dependency-check-report.sarif
        category: sca-backend

  # ─────────────────────────────────────────────────────────────────────────
  # SCA — Frontend: npm audit
  # ─────────────────────────────────────────────────────────────────────────
  sca-frontend:
    name: SCA — Frontend Dependencies (npm audit)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: npm audit (high + critical)
      working-directory: ./frontend
      run: npm audit --audit-level=high --json > npm-audit.json || true

    - name: Summarise npm audit results
      if: always()
      working-directory: ./frontend
      run: |
        if [ -f npm-audit.json ]; then
          echo "### npm audit results" >> "$GITHUB_STEP_SUMMARY"
          VULNS=$(jq '.metadata.vulnerabilities' npm-audit.json 2>/dev/null || echo '{}')
          HIGH=$(echo "$VULNS" | jq '.high // 0')
          CRIT=$(echo "$VULNS" | jq '.critical // 0')
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | $CRIT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High     | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "⚠️ Found $CRIT critical and $HIGH high severity vulnerabilities" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ No high or critical vulnerabilities found" >> "$GITHUB_STEP_SUMMARY"
        fi

  # ─────────────────────────────────────────────────────────────────────────
  # Secret Detection — TruffleHog
  # Scans commits introduced by this PR/push for leaked secrets.
  # Only runs on pull requests (scheduled & push scans are handled by
  # pre-commit hooks in the developer workflow).
  # ─────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: TruffleHog — scan PR commits
      uses: trufflesecurity/trufflehog@main
      with:
        base: ${{ github.event.pull_request.base.sha }}
        head: ${{ github.event.pull_request.head.sha }}
        extra_args: --only-verified
