name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, edited]

jobs:
  pr-title-check:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
          requireScope: true
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            Subject must start with uppercase letter.
            Example: "feat(auth): Add JWT refresh token"

  branch-naming-check:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feature|bugfix|hotfix|release)\/[A-Z]+-[0-9]+-[a-z0-9-]+$ ]]; then
            echo "❌ Invalid branch name: $BRANCH_NAME"
            echo "✅ Expected format: feature/CB-123-description"
            echo "   Allowed prefixes: feature/, bugfix/, hotfix/, release/"
            exit 1
          fi
          echo "✅ Branch name is valid: $BRANCH_NAME"

  commit-message-lint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          git log --format=%s origin/${{ github.base_ref }}..${{ github.head_ref }} | while read msg; do
            if [[ ! "$msg" =~ ^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .+ ]]; then
              echo "❌ Invalid commit message: $msg"
              echo "✅ Expected format: type(scope): description"
              exit 1
            fi
          done
          echo "✅ All commit messages are valid"

  backend-tests:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: communityboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      
      - name: Run tests with coverage
        working-directory: ./backend
        run: mvn clean test jacoco:report
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/communityboard
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
      
      - name: Check coverage threshold
        working-directory: ./backend
        run: |
          COVERAGE=$(mvn jacoco:report jacoco:check -Djacoco.haltOnFailure=false | grep -oP 'Total.*?(\d+)%' | grep -oP '\d+' | tail -1)
          echo "Code coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 80 ]; then
            echo "❌ Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "✅ Coverage meets 80% threshold"
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: backend

  frontend-tests:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false
      
      - name: Check coverage threshold
        working-directory: ./frontend
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi
          echo "✅ Coverage meets 70% threshold"
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Backend dependency check
        working-directory: ./backend
        run: mvn dependency-check:check -DfailBuildOnCVSS=7
      
      - name: Frontend dependency check
        working-directory: ./frontend
        run: npm audit --audit-level=high

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Backend linting
        working-directory: ./backend
        run: mvn checkstyle:check
      
      - name: Frontend linting
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint

  pr-validation-summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [pr-title-check, branch-naming-check, commit-message-lint, backend-tests, frontend-tests, security-scan, dependency-check, code-quality]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.pr-title-check.result }}" != "success" ]] || \
             [[ "${{ needs.branch-naming-check.result }}" != "success" ]] || \
             [[ "${{ needs.commit-message-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-tests.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-tests.result }}" != "success" ]] || \
             [[ "${{ needs.security-scan.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-check.result }}" != "success" ]] || \
             [[ "${{ needs.code-quality.result }}" != "success" ]]; then
            echo "❌ PR validation failed"
            exit 1
          fi
          echo "✅ All PR validation checks passed"
