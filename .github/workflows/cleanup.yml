##############################################################################
# cleanup.yml — Auto-delete merged PR branches
#
# Triggers on every closed PR. If the PR was merged (not just closed/rejected),
# delete the head branch immediately.
# Target branch lifetime: 1–3 hours.
#
# This is the code-level equivalent of:
#   Settings → General → "Automatically delete head branches"
# Having it here makes the behaviour explicit and version-controlled.
#
# Protected branches (main, develop) are never deleted because those branches
# are not typically the head of a PR targeting themselves.
##############################################################################
name: Branch Cleanup

on:
  pull_request:
    types: [ closed ]

permissions:
  contents: write # required to delete refs

jobs:
  delete-merged-branch:
    name: Delete branch after merge
    runs-on: ubuntu-latest
    # Only run when the PR was actually merged, not just closed/abandoned.
    # Also skip the permanent integration branches.
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref != 'main' &&
      github.event.pull_request.head.ref != 'develop'

    steps:
    - name: Delete head branch
      uses: actions/github-script@v7
      with:
        script: |
          const branch = context.payload.pull_request.head.ref;
          const owner  = context.repo.owner;
          const repo   = context.repo.repo;

          try {
            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `heads/${branch}`,
            });
            core.info(`✅ Deleted branch: ${branch}`);
          } catch (err) {
            // Branch may already be deleted (e.g. by the GitHub UI setting).
            // Treat 422 (reference doesn't exist) as a non-error.
            if (err.status === 422) {
              core.info(`Branch '${branch}' already deleted — skipping.`);
            } else {
              core.setFailed(`Failed to delete branch '${branch}': ${err.message}`);
            }
          }
