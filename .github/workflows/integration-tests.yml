##############################################################################
# integration-tests.yml — Full-Stack Integration Testing Pipeline
#
# Runs the backend Spring Boot @SpringBootTest tests against a REAL PostgreSQL
# service container (not H2), verifying that the application integrates
# correctly with the actual production-equivalent database.
#
# Differences from unit tests:
#   - Uses PostgreSQL (not H2) — validates SQL dialect, Flyway migrations
#   - Tests CommentControllerSecurityTest, PostControllerSecurityTest,
#     ErrorHandlingIntegrationTest with a live application context + real DB
#   - System properties override the H2 test application.properties
#
# Jobs:
#   integration-tests — Spin up Postgres service, run @SpringBootTest suite
#
# Triggers: push/PR to main or develop
##############################################################################
name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:


concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write # for test result annotations

jobs:
  integration-tests:
    name: Spring Boot Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest

    # ── PostgreSQL service container ────────────────────────────────────────
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
        ports:
        - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: temurin
        cache: maven

    - name: Verify PostgreSQL service is ready
      run: |
        echo "Checking PostgreSQL is accepting connections..."
        pg_isready -h localhost -p 5432 -U postgres || {
          echo "❌ PostgreSQL service is not ready"
          exit 1
        }
        echo "✅ PostgreSQL is ready"

    # ── Run integration tests against real PostgreSQL ────────────────────────
    # System properties here override the H2 settings in
    # src/test/resources/application.properties so that @SpringBootTest
    # uses the PostgreSQL service container instead.
    #
    # Flyway is kept enabled so that the real migration scripts (V1, V2)
    # are validated against PostgreSQL — this is the primary value of
    # running these tests outside of H2.
    - name: Run integration tests against PostgreSQL
      working-directory: ./backend
      env:
        # Credentials for the PostgreSQL service container above — CI-only placeholders
        DB_URL: jdbc:postgresql://localhost:5432/testdb
        DB_USERNAME: postgres
        DB_PASSWORD: postgres # pragma: allowlist secret
        JWT_SECRET: ci-jwt-secret-for-integration-testing-32c # pragma: allowlist secret
        MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"
      run: |
        mvn verify \
          "-Dspring.datasource.url=${DB_URL}" \
          "-Dspring.datasource.username=${DB_USERNAME}" \
          "-Dspring.datasource.password=${DB_PASSWORD}" \
          -Dspring.datasource.driver-class-name=org.postgresql.Driver \
          -Dspring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect \
          -Dspring.jpa.hibernate.ddl-auto=none \
          -Dspring.flyway.enabled=true \
          -Djacoco.check.skip=true \
          -Dsurefire.failIfNoSpecifiedTests=false

    # ── Publish results ──────────────────────────────────────────────────────
    - name: Publish integration test results
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Integration Test Results (PostgreSQL)
        path: backend/target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false

    - name: Upload integration test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-reports-${{ github.run_number }}
        path: |
          backend/target/surefire-reports/
          backend/target/failsafe-reports/
        retention-days: 7
