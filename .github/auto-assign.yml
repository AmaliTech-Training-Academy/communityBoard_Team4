# Auto-assign reviewers based on files changed

addReviewers: true
addAssignees: false
numberOfReviewers: 2

reviewers:
- Bruce-the-dev
- kwadjo-wusu-ansah
- JoelAlumasa
- DivineBAYINGANA
- ResearcherErnest

# Assign reviewers based on file patterns
filePathAssignments:
  # Backend files
  'backend/**':
  - Bruce-the-dev
  # Frontend files
  'frontend/**':
  - kwadjo-wusu-ansah
  # DevOps files
  'devops/**':
  - JoelAlumasa
  '.github/**':
  - JoelAlumasa
  'docker-compose.yml':
  - JoelAlumasa
  '**/Dockerfile':
  - JoelAlumasa
  # QA files
  'qa/**':
  - DivineBAYINGANA
  # Data Engineering files
  'data-engineering/**':
  - ResearcherErnest
  # Security sensitive
  '**/security/**':
  - JoelAlumasa
  '**/.env*':
  - JoelAlumasa

# Skip draft PRs
skipDraftPR: true
