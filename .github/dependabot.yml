##############################################################################
# dependabot.yml — Automated Dependency Updates
#
# Dependabot opens PRs every week for each ecosystem to keep dependencies
# current and within patch/minor ranges. Labels and limits are set to keep
# the PR queue manageable and easy to triage.
#
# Ecosystems covered:
#   maven         — backend/pom.xml
#   npm           — frontend/package.json
#   docker        — backend/Dockerfile, frontend/Dockerfile
#   github-actions — .github/workflows/*.yml
#   terraform     — devops/terraform/aws/**
##############################################################################
version: 2

updates:
# ── Backend Java / Maven ───────────────────────────────────────────────
- package-ecosystem: maven
  directory: /backend
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 5
  labels: [ dependencies, java ]
  commit-message:
    prefix: chore
    include: scope

# ── Frontend Node / npm ────────────────────────────────────────────────
- package-ecosystem: npm
  directory: /frontend
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 5
  labels: [ dependencies, javascript ]
  commit-message:
    prefix: chore
    include: scope
  ignore:
  # Major version bumps for React, Vite, Vitest need manual review
  - dependency-name: "react"
    update-types: [ "version-update:semver-major" ]
  - dependency-name: "react-dom"
    update-types: [ "version-update:semver-major" ]
  - dependency-name: "vite"
    update-types: [ "version-update:semver-major" ]

# ── Backend Docker image ───────────────────────────────────────────────
- package-ecosystem: docker
  directory: /backend
  schedule:
    interval: weekly
    day: tuesday
  labels: [ dependencies, docker ]
  commit-message:
    prefix: chore

# ── Frontend Docker image ──────────────────────────────────────────────
- package-ecosystem: docker
  directory: /frontend
  schedule:
    interval: weekly
    day: tuesday
  labels: [ dependencies, docker ]
  commit-message:
    prefix: chore

# ── GitHub Actions ─────────────────────────────────────────────────────
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: wednesday
  open-pull-requests-limit: 5
  labels: [ dependencies, github-actions ]
  commit-message:
    prefix: chore

# ── Terraform providers & modules ─────────────────────────────────────
- package-ecosystem: terraform
  directory: /devops/terraform/aws
  schedule:
    interval: weekly
    day: wednesday
  open-pull-requests-limit: 5
  labels: [ dependencies, terraform ]
  commit-message:
    prefix: chore
