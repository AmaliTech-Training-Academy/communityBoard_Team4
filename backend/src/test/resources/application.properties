# ── Test datasource: H2 in-memory, PostgreSQL compatibility mode ─────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use H2 dialect (Hibernate 6 auto-detects, but explicit is safer)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Let Hibernate create/drop schema; Flyway is disabled for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Silence SQL noise in test output
spring.jpa.show-sql=false
