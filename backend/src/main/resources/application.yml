spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/communityboard}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres} # pragma: allowlist secret
  jpa:
    hibernate:
      # 'validate' — Hibernate checks entity mappings against the real schema but makes no changes.
      # Flyway is the single source of truth for DDL. Never use 'update' in production.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    # Flyway manages all schema creation and migrations.
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: safely handles databases that existed before Flyway was introduced.
    # On a fresh DB, all migrations (V1, V2, …) run normally.
    # On an pre-existing DB without flyway_schema_history, Flyway baselines at V1 then runs V2+.
    baseline-on-migrate: true
    baseline-version: 1
  sql:
    init:
      # Disabled — data.sql/schema.sql must NOT run alongside Flyway (V2__seed_data.sql handles seeding).
      mode: never

jwt:
  secret: ${JWT_SECRET:communityboard-secret-key-amalitech-2024} # pragma: allowlist secret
  expiration: 86400000 # 24 hours in milliseconds

# CORS: comma-separated list of allowed origins
# Override via CORS_ALLOWED_ORIGINS env variable in production
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# CB-214 + DevOps Logging: Spring Boot Actuator monitoring endpoints
management:
  endpoints:
    web:
      exposure:
        # health, info (public) + prometheus (metrics scraping) + DevOps log/env/flyway endpoints
        # heapdump intentionally excluded — heap files can expose secrets in memory
        include: health,info,prometheus,metrics,loggers,env,flyway,threaddump
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: communityboard
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

# Logging levels
logging:
  level:
    com.amalitech.communityboard: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
