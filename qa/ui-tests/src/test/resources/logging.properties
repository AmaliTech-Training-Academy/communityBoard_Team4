# Suppress noisy JUL output from Selenium and WebDriverManager during test runs.

# Root handler – write to console at WARNING and above
handlers=java.util.logging.ConsoleHandler
.level=WARNING
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%5$s%n

# Allow INFO and above for test watcher logs
com.amalitech.qa.level=INFO

# Silence CDP version-mismatch warnings from Selenium
org.openqa.selenium.level=OFF
org.openqa.selenium.devtools.level=OFF
org.openqa.selenium.chromium.level=OFF

# Silence WebDriverManager driver-resolution INFO messages
io.github.bonigarcia.wdm.level=OFF
